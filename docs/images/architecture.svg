<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb8500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffb703;stop-opacity:1"/>
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb8500"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#archBg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">System Architecture</text>
  <rect x="320" y="42" width="160" height="2" rx="1" fill="url(#archAccent)" opacity="0.6"/>

  <!-- Row 1: Input Stage -->
  <!-- Financial CSV -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="70" width="140" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="100" y="92" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">📄</text>
    <text x="100" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Financial CSV</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="170" y1="97" x2="210" y2="97" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Data Parser -->
  <g filter="url(#boxShadow)">
    <rect x="215" y="70" width="140" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="285" y="92" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">🔍</text>
    <text x="285" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Data Parser</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="355" y1="97" x2="395" y2="97" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Metric Engine -->
  <g filter="url(#boxShadow)">
    <rect x="400" y="70" width="160" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="480" y="92" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">⚙️</text>
    <text x="480" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Metric Engine</text>
  </g>

  <!-- Arrow down from Metric Engine -->
  <line x1="480" y1="125" x2="480" y2="165" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow right from Metric Engine -->
  <line x1="560" y1="97" x2="600" y2="97" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Config -->
  <g filter="url(#boxShadow)">
    <rect x="605" y="70" width="160" height="55" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="685" y="92" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">⚙️</text>
    <text x="685" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e">config.yaml</text>
  </g>

  <!-- Row 2: Analysis Stage -->
  <!-- Ratio Calculator -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="170" width="160" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="110" y="192" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">📊</text>
    <text x="110" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Ratio Calculator</text>
  </g>

  <!-- Period Comparator -->
  <g filter="url(#boxShadow)">
    <rect x="215" y="170" width="175" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="302" y="192" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">🔄</text>
    <text x="302" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Period Comparator</text>
  </g>

  <!-- Forecast Engine -->
  <g filter="url(#boxShadow)">
    <rect x="415" y="170" width="160" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="1.5"/>
    <text x="495" y="192" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">🔮</text>
    <text x="495" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Forecast Engine</text>
  </g>

  <!-- Arrows between row 2 -->
  <line x1="190" y1="197" x2="213" y2="197" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="390" y1="197" x2="413" y2="197" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow down from row 2 center to LLM -->
  <line x1="302" y1="225" x2="302" y2="265" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="495" y1="225" x2="400" y2="270" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="110" y1="225" x2="210" y2="270" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 3: LLM Report Generator (wide box) -->
  <g filter="url(#boxShadow)">
    <rect x="160" y="270" width="290" height="55" rx="8" fill="#21262d" stroke="#fb8500" stroke-width="2"/>
    <text x="305" y="292" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">🤖</text>
    <text x="305" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e6edf3">LLM Report Generator</text>
  </g>

  <!-- Ollama badge -->
  <g filter="url(#boxShadow)">
    <rect x="615" y="270" width="140" height="55" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="685" y="292" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">🦙</text>
    <text x="685" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e">Ollama (gemma3)</text>
  </g>

  <line x1="450" y1="297" x2="613" y2="297" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>

  <!-- Row 4: Outputs -->
  <!-- Arrow from LLM to outputs -->
  <line x1="230" y1="325" x2="130" y2="355" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="305" y1="325" x2="370" y2="355" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="325" x2="590" y2="355" stroke="#fb8500" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Executive Summary -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="355" width="170" height="35" rx="6" fill="#fb8500" opacity="0.15"/>
    <rect x="30" y="355" width="170" height="35" rx="6" fill="none" stroke="#fb8500" stroke-width="1.5"/>
    <text x="115" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#fb8500">Executive Summary</text>
  </g>

  <!-- Full Report -->
  <g filter="url(#boxShadow)">
    <rect x="280" y="355" width="170" height="35" rx="6" fill="#fb8500" opacity="0.15"/>
    <rect x="280" y="355" width="170" height="35" rx="6" fill="none" stroke="#fb8500" stroke-width="1.5"/>
    <text x="365" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#fb8500">Full Report</text>
  </g>

  <!-- Cash Flow -->
  <g filter="url(#boxShadow)">
    <rect x="530" y="355" width="170" height="35" rx="6" fill="#fb8500" opacity="0.15"/>
    <rect x="530" y="355" width="170" height="35" rx="6" fill="none" stroke="#fb8500" stroke-width="1.5"/>
    <text x="615" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#fb8500">Cash Flow Narrative</text>
  </g>
</svg>
