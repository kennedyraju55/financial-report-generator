<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb8500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffb703;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>
  <rect x="0" y="196" width="800" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Decorative chart bars (left side) -->
  <g opacity="0.15" transform="translate(30, 60)">
    <rect x="0" y="80" width="16" height="50" rx="3" fill="#fb8500"/>
    <rect x="22" y="55" width="16" height="75" rx="3" fill="#fb8500"/>
    <rect x="44" y="30" width="16" height="100" rx="3" fill="#fb8500"/>
    <rect x="66" y="45" width="16" height="85" rx="3" fill="#fb8500"/>
    <rect x="88" y="10" width="16" height="120" rx="3" fill="#fb8500"/>
  </g>

  <!-- Decorative trend line (right side) -->
  <g opacity="0.15" transform="translate(620, 50)">
    <polyline points="0,100 30,80 60,90 90,50 120,30 150,45" stroke="#fb8500" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="100" r="4" fill="#fb8500"/>
    <circle cx="30" cy="80" r="4" fill="#fb8500"/>
    <circle cx="60" cy="90" r="4" fill="#fb8500"/>
    <circle cx="90" cy="50" r="4" fill="#fb8500"/>
    <circle cx="120" cy="30" r="4" fill="#fb8500"/>
    <circle cx="150" cy="45" r="4" fill="#fb8500"/>
  </g>

  <!-- Dollar sign icon -->
  <g transform="translate(175, 45)" filter="url(#glow)">
    <circle cx="28" cy="28" r="28" fill="none" stroke="#fb8500" stroke-width="2.5" opacity="0.9"/>
    <text x="28" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#fb8500">$</text>
  </g>

  <!-- Title -->
  <text x="400" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="1">Financial Report Generator</text>

  <!-- Tagline -->
  <text x="400" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">AI-Powered Financial Analysis &amp; Forecasting</text>

  <!-- Accent divider -->
  <rect x="310" y="132" width="180" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Sub-badges -->
  <g transform="translate(270, 152)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#fb8500" opacity="0.2"/>
    <text x="40" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">Local LLM</text>
  </g>
  <g transform="translate(360, 152)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#fb8500" opacity="0.2"/>
    <text x="40" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">Python 3.10+</text>
  </g>
  <g transform="translate(450, 152)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#fb8500" opacity="0.2"/>
    <text x="40" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb8500">Click CLI</text>
  </g>
</svg>
